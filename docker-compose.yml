version: '3.8'

services:
  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: patient-management-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./backups:/var/opt/mssql/backups
    networks:
      - patient-management-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${DB_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # .NET API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patient-management-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=PatientManagementDb;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=PatientManagementAPI
      - JwtSettings__Audience=PatientManagementApp
      - JwtSettings__ExpiryInHours=8
      - Serilog__MinimumLevel__Default=Information
      - Serilog__MinimumLevel__Override__Microsoft=Warning
      - Serilog__MinimumLevel__Override__System=Warning
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - patient-management-network
    restart: unless-stopped

  # React Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: patient-management-frontend
    ports:
      - "3000:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - patient-management-network
    restart: unless-stopped

  # Backup Service (Cron-based)
  backup:
    image: mcr.microsoft.com/mssql-tools
    container_name: patient-management-backup
    environment:
      - DB_HOST=db
      - DB_SA_PASSWORD=${DB_SA_PASSWORD}
      - DB_NAME=PatientManagementDb
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - ./backups:/backups
      - ./scripts/backup-database.sh:/backup-database.sh:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - patient-management-network
    entrypoint: >
      sh -c "
      echo '0 2 * * * /backup-database.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
      crond -f -l 2"
    restart: unless-stopped

networks:
  patient-management-network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
